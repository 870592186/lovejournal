name: Android CI & OTA Push

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0.1）时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 1. 将 APK 发布到 GitHub Release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 调用 PHP 接口，分别通知两个不同密钥的服务器# 别忘了去 GitHub 设置这两个 Secret
      #因为脚本里引用了两个不同的变量，你需要去 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中添加：
      #OTA_PUSH_SECRET_1: 对应第一个服务器 config.php 里的密钥。
      #OTA_PUSH_SECRET_2: 对应第二个服务器 config.php 里的密钥。
      - name: Push OTA to Multiple Servers
        run: |
          # 1. 准备基础变量
          VERSION_NAME=$(echo "${{ github.ref_name }}" | sed 's/v//g')
          
          # 计算 VersionCode (逻辑: 1.0.1 -> 10001)
          IFS='.' read -r -a parts <<< "$VERSION_NAME"
          VERSION_CODE=$((parts[0]*10000 + parts[1]*100 + parts[2]))
          
          # 构造下载链接
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-release.apk"
          
          # 定义更新日志
          UPDATE_LOG="GitHub 自动构建发布：${{ github.event.head_commit.message }}"

          echo "🚀 开始双服务器推送，版本：$VERSION_NAME ($VERSION_CODE)"

          # --------- 推送到服务器 1 ---------
          echo "正在推送至官方服务器..."
          curl -s -X POST "https://x.xtay.cn/love_api/push_update.php" \
            -d "secret=${{ secrets.OTA_PUSH_SECRET_1 }}" \
            -d "v_code=$VERSION_CODE" \
            -d "v_name=$VERSION_NAME" \
            -d "url=$DOWNLOAD_URL" \
            -d "log=$UPDATE_LOG"
          echo -e "\n服务器 A 推送完成。"

          # --------- 推送到服务器 2 ---------
          echo "正在推送至自建服务器阿里云..."
          curl -s -X POST "http://39.107.106.57:14567/love_api/push_update.php" \
            -d "secret=${{ secrets.OTA_PUSH_SECRET_2 }}" \
            -d "v_code=$VERSION_CODE" \
            -d "v_name=$VERSION_NAME" \
            -d "url=$DOWNLOAD_URL" \
            -d "log=$UPDATE_LOG"
          echo -e "\n服务器 B 推送完成。"