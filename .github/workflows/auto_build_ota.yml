name: Android CI & OTA Push

on:
  push:
    tags:
      - 'v*' # 推送 v1.0.1 这种标签时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 💖 修正 1：移除多余横线，修复换行符
      - name: Fix permissions and format
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      # 💖 修正 2：确保命令独立运行
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 💖 修正 3：发布到 GitHub Release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      # 💖 修正 4：双服推送逻辑（同样移除了多余的横线）
      - name: Push OTA to Multiple Servers
        run: |
          VERSION_NAME=$(echo "${{ github.ref_name }}" | sed 's/v//g')
          IFS='.' read -r -a parts <<< "$VERSION_NAME"
          VERSION_CODE=$((parts[0]*10000 + parts[1]*100 + parts[2]))
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-debug.apk"
          UPDATE_LOG="GitHub 自动构建发布：${{ github.event.head_commit.message }}"

          echo "🚀 开始双服务器推送..."
          
          # 推送服务器 A
          curl -s -X POST "https://x.xtay.cn/love_api/push_update.php" \
            -d "secret=${{ secrets.OTA_PUSH_SECRET_1 }}" \
            -d "v_code=$VERSION_CODE" \
            -d "v_name=$VERSION_NAME" \
            -d "url=$DOWNLOAD_URL" \
            -d "log=$UPDATE_LOG"

          # 推送服务器 B
          curl -s -X POST "http://39.107.106.57:14567/love_api/push_update.php" \
            -d "secret=${{ secrets.OTA_PUSH_SECRET_2 }}" \
            -d "v_code=$VERSION_CODE" \
            -d "v_name=$VERSION_NAME" \
            -d "url=$DOWNLOAD_URL" \
            -d "log=$UPDATE_LOG"