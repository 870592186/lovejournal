name: Android CI & OTA Push

on:
  push:
    tags:
      - 'v*' # 推送 v1.0.1 这种标签时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 💖 修正 1：移除多余横线，修复换行符
      - name: Fix permissions and format
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      # 💖 修正 2：改为 assembleRelease，打出正式版的未签名包
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 💖 核心新增：调用专业签名工具，使用你的专属身份证盖章
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      # 💖 修正 3：上传签名后的正式版 APK
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # 魔法变量：自动获取上一步签名成功的 APK 路径
          files: ${{steps.sign_app.outputs.signedReleaseFile}}
          token: ${{ secrets.GITHUB_TOKEN }}

      # 💖 修正 4：推送给手机的 URL，记得把结尾的 app-debug.apk 改成 app-release-signed.apk！
      - name: Push OTA to Multiple Servers
        run: |
          VERSION_NAME=$(echo "${{ github.ref_name }}" | sed 's/v//g')
          IFS='.' read -r -a parts <<< "$VERSION_NAME"
          VERSION_CODE=$((parts[0]*10000 + parts[1]*100 + parts[2]))
          
          # 结尾改成 app-release-signed.apk
          DOWNLOAD_URL="https://ghproxy.net/https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-release-signed.apk"
          UPDATE_LOG="GitHub 自动构建发布：${{ github.event.head_commit.message }}"

          echo "🚀 开始双服务器推送..."
          
          # 推送服务器 A
          curl -s -X POST "https://x.xtay.cn/love_api/push_update.php" \
            -d "secret=${{ secrets.OTA_PUSH_SECRET_1 }}" \
            -d "v_code=$VERSION_CODE" \
            -d "v_name=$VERSION_NAME" \
            -d "url=$DOWNLOAD_URL" \
            -d "log=$UPDATE_LOG"

          # 推送服务器 B
          curl -s -X POST "http://39.107.106.57:14567/love_api/push_update.php" \
            -d "secret=${{ secrets.OTA_PUSH_SECRET_2 }}" \
            -d "v_code=$VERSION_CODE" \
            -d "v_name=$VERSION_NAME" \
            -d "url=$DOWNLOAD_URL" \
            -d "log=$UPDATE_LOG"