name: Android CI & OTA Push

on:
  push:
    tags:
      - 'v*' # 推送 v1.0.1 这种标签时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 💖 修正 1：移除多余横线，修复换行符
      - name: Fix permissions and format
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      # 💖 修正 2：改为 assembleRelease，打出正式版的未签名包
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 💖 终极方案：抛弃所有垃圾第三方插件，纯原生 Android 官方命令签名！绝对不会报错！
      - name: Sign APK (Native)
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. 还原签名文件
          echo "$KEYSTORE_BASE64" | base64 -d > my.jks
          
          # 2. 自动寻找服务器上自带的、最新的安卓工具，不用再死磕 29.0.3 了
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          ZIPALIGN="$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign"
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"
          
          # 3. 对齐优化 APK (Google 强制要求)
          $ZIPALIGN -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk
          
          # 4. 执行官方签名
          $APKSIGNER sign --ks my.jks --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$KEYSTORE_PASSWORD" --key-pass pass:"$KEY_PASSWORD" app-release-aligned.apk
          
          # 5. 放回原目录
          mv app-release-aligned.apk app/build/outputs/apk/release/app-release-signed.apk

      # 💖 重新使用固定路径发布
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-signed.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      # 💖 修正 4：推送给手机的 URL，记得把结尾的 app-debug.apk 改成 app-release-signed.apk！
      - name: Push OTA to Multiple Servers
        run: |
          VERSION_NAME=$(echo "${{ github.ref_name }}" | sed 's/v//g')
          IFS='.' read -r -a parts <<< "$VERSION_NAME"
          VERSION_CODE=$((parts[0]*10000 + parts[1]*100 + parts[2]))
          
          # 结尾改成 app-release-signed.apk
          DOWNLOAD_URL="https://ghproxy.net/https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-release-signed.apk"
          UPDATE_LOG="GitHub 自动构建发布：${{ github.event.head_commit.message }}"

          echo "🚀 开始双服务器推送..."
          
          # 推送服务器 A
          curl -s -X POST "https://love.sraiy.com/love_api/push_update.php" \
            -d "secret=${{ secrets.OTA_PUSH_SECRET_1 }}" \
            -d "v_code=$VERSION_CODE" \
            -d "v_name=$VERSION_NAME" \
            -d "url=$DOWNLOAD_URL" \
            -d "log=$UPDATE_LOG"

          # 推送服务器 B
          curl -s -X POST "http://39.107.106.57:14567/love_api/push_update.php" \
            -d "secret=${{ secrets.OTA_PUSH_SECRET_2 }}" \
            -d "v_code=$VERSION_CODE" \
            -d "v_name=$VERSION_NAME" \
            -d "url=$DOWNLOAD_URL" \
            -d "log=$UPDATE_LOG"